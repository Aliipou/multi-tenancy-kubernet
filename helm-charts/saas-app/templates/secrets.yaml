apiVersion: v1
kind: Secret
metadata:
  name: {{ include "saas-app.fullname" . }}-secrets
  namespace: {{ .Values.tenant.namespace }}
  labels:
    {{- include "saas-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.auth.jwtSecret }}
  jwt-secret: {{ .Values.auth.jwtSecret | quote }}
  {{- else }}
  {{- fail "auth.jwtSecret is required. Generate one with: openssl rand -base64 32" }}
  {{- end }}
