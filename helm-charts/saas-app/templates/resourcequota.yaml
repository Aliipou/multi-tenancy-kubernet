{{- if .Values.resourceQuota.enabled }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ include "saas-app.fullname" . }}-quota
  namespace: {{ .Values.tenant.namespace }}
  labels:
    {{- include "saas-app.labels" . | nindent 4 }}
spec:
  hard:
    {{- toYaml .Values.resourceQuota.hard | nindent 4 }}
{{- end }}
