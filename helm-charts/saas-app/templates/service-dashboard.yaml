{{- if .Values.dashboardService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "saas-app.fullname" . }}-dashboard
  namespace: {{ .Values.tenant.namespace }}
  labels:
    {{- include "saas-app.dashboardService.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dashboardService.service.type }}
  ports:
  - port: {{ .Values.dashboardService.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "saas-app.dashboardService.selectorLabels" . | nindent 4 }}
{{- end }}
