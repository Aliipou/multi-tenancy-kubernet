{{- if .Values.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "saas-app.fullname" . }}-role
  namespace: {{ .Values.tenant.namespace }}
  labels:
    {{- include "saas-app.labels" . | nindent 4 }}
rules:
# Allow pods to be listed, watched, and their logs accessed
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
# Allow services to be accessed
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
# Allow configmaps and secrets to be read
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
# Allow deployments to be viewed
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "saas-app.fullname" . }}-rolebinding
  namespace: {{ .Values.tenant.namespace }}
  labels:
    {{- include "saas-app.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "saas-app.serviceAccountName" . }}
  namespace: {{ .Values.tenant.namespace }}
roleRef:
  kind: Role
  name: {{ include "saas-app.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
