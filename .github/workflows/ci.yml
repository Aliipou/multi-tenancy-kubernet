name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: 'latest'
      - name: Helm lint
        run: |
          find . -name "Chart.yaml" -exec dirname {} \; | while read dir; do
            echo "Linting $dir"
            helm lint "$dir"
          done
      - name: Validate YAML
        run: find . -name "*.yaml" -o -name "*.yml" | xargs -I {} sh -c 'echo "Checking {}..." && cat "{}" | python3 -c "import sys,yaml; yaml.safe_load(sys.stdin)" && echo "OK"' 2>/dev/null || true
