{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "saas-app.fullname" . }}-netpol
  namespace: {{ .Values.tenant.namespace }}
  labels:
    {{- include "saas-app.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}

  # Ingress rules
  ingress:
  # Allow traffic from ingress controller
  {{- range .Values.networkPolicy.ingress }}
  - from:
    {{- toYaml .from | nindent 4 }}
  {{- end }}
  # Allow traffic within the same namespace
  - from:
    - podSelector: {}

  # Egress rules
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow traffic to pods in the same namespace
  - to:
    - podSelector: {}
  # Allow traffic to external services (if specified)
  {{- range .Values.networkPolicy.egress }}
  - to:
    {{- toYaml .to | nindent 4 }}
  {{- end }}
{{- end }}
