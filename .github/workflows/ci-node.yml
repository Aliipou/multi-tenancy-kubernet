name: Node.js CI

on:
  push:
    branches: [main, master]
    paths:
      - "services/auth-service/**"
      - "services/api-service/**"
      - "services/dashboard-service/**"
      - ".github/workflows/ci-node.yml"
  pull_request:
    branches: [main, master]

jobs:
  # ── Auth Service ─────────────────────────────────────────────────────────────
  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80,"functions":80,"branches":70,"statements":80}}'
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          TENANT_ID: default

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-service-coverage
          path: services/auth-service/coverage/

  # ── API Service ──────────────────────────────────────────────────────────────
  test-api-service:
    name: Test API Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/api-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80,"functions":80,"branches":70,"statements":80}}'
        env:
          NODE_ENV: test
          TENANT_ID: default
          AUTH_SERVICE_URL: http://localhost:3001

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-service-coverage
          path: services/api-service/coverage/

  # ── Dashboard Service ────────────────────────────────────────────────────────
  test-dashboard-service:
    name: Test Dashboard Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/dashboard-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80,"functions":80,"branches":70,"statements":80}}'
        env:
          NODE_ENV: test
          TENANT_ID: default
          AUTH_SERVICE_URL: http://localhost:3001
          API_SERVICE_URL: http://localhost:3002

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-service-coverage
          path: services/dashboard-service/coverage/

  # ── Helm saas-app ───────────────────────────────────────────────────────────
  validate-saas-helm:
    name: Validate saas-app Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart (tenant1 defaults)
        run: |
          helm lint helm-charts/saas-app

      - name: Lint chart (tenant2 overrides)
        run: |
          helm lint helm-charts/saas-app \
            -f helm-charts/saas-app/values-overrides/tenant2.yaml

      - name: Lint chart (tenant3 overrides)
        run: |
          helm lint helm-charts/saas-app \
            -f helm-charts/saas-app/values-overrides/tenant3.yaml

      - name: Template render — tenant1
        run: |
          helm template tenant1 helm-charts/saas-app \
            --set tenant.id=tenant1 \
            --set tenant.namespace=tenant1

      - name: Template render — tenant2 (enterprise)
        run: |
          helm template tenant2 helm-charts/saas-app \
            -f helm-charts/saas-app/values-overrides/tenant2.yaml

  # ── Summary gate ─────────────────────────────────────────────────────────────
  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs:
      - test-auth-service
      - test-api-service
      - test-dashboard-service
      - validate-saas-helm
    steps:
      - run: echo "All Node.js and Helm checks passed."
